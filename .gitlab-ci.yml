# GitLab CI/CD pipeline for the Alloy Fleet Manager (OSS) project.
#
# GitLab is the source of truth. GitHub (https://github.com/danielfree19/...)
# is the public read-only mirror updated by the `mirror:github` job below on
# every push to a protected branch and on every tag.
#
# The pipeline is structured so that:
#   * fast feedback (lint, typecheck, build, unit) runs on every MR and
#     every push to a non-tag ref;
#   * the e2e-terraform.sh smoke runs only on `main` and on tags so MR
#     time-to-green stays low;
#   * release artifacts (npm, terraform provider, fleetctl, docker) only
#     publish when a version tag (`v*`) is pushed.
#
# Conventions:
#   * Variables ending `_TOKEN` / `_KEY` / `_PASSPHRASE` are CI secrets,
#     defined under Settings → CI/CD → Variables. They are listed in
#     `docs/ci-cd.md`.
#   * `release/*` is reserved for tag-triggered jobs.
#   * `interruptible: true` on every non-release job lets new pushes
#     auto-cancel stale runs.

# We pin the default image — most jobs use Node 20 — and override for
# Go / docker / terraform jobs that need a different toolchain.
default:
  image: node:20-bookworm
  interruptible: true
  # Pin every job to the Docker-executor runner pool. Shell runners on
  # this instance silently ignore `image:` and run scripts on the host —
  # which doesn't have node/go/docker/yamllint/goreleaser, so every job
  # would fail with `command not found`. Docker runners must carry the
  # `docker` tag.
  tags:
    - docker
  # On a fresh clone GitLab pulls the full history, which is wasteful for
  # most jobs. Shallow clones speed up MR pipelines materially.
  before_script:
    - node --version
    - npm --version

# ---------------------------------------------------------------------------
# Stages run sequentially; jobs within a stage run in parallel.
# ---------------------------------------------------------------------------
stages:
  - lint
  - build
  - test
  - smoke
  - release
  - mirror

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
variables:
  # Reproducible installs everywhere.
  npm_config_cache: "$CI_PROJECT_DIR/.npm-cache"
  GOFLAGS: "-mod=readonly"
  # Provider Go module path — used by the goreleaser job and any Go-side
  # caching key. Kept here so changing the layout requires updating one
  # place.
  PROVIDER_DIR: "terraform/provider-fleet"
  FLEETCTL_DIR: "cmd/fleetctl"

# Cache npm and the workspace's node_modules across jobs in the same
# pipeline. We DON'T cache `dist/` — that should always be a fresh build
# from the matching source.
.cache_node: &cache_node
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm-cache/
      - node_modules/
      - apps/*/node_modules/
      - packages/*/node_modules/
    policy: pull-push

# Same idea for the two Go modules. The cache key is per-module so we don't
# invalidate the provider when only fleetctl moves.
.cache_go_provider: &cache_go_provider
  cache:
    key:
      files:
        - terraform/provider-fleet/go.sum
    paths:
      - .go-cache-provider/
    policy: pull-push

.cache_go_fleetctl: &cache_go_fleetctl
  cache:
    key:
      files:
        - cmd/fleetctl/go.sum
    paths:
      - .go-cache-fleetctl/
    policy: pull-push

# Reusable rules — keep these in one place so the matrix doesn't drift.
.rules_mr_or_default_branch: &rules_mr_or_default_branch
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'

.rules_default_branch_or_tag: &rules_default_branch_or_tag
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'

.rules_tag_only: &rules_tag_only
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

.rules_nightly_or_tag: &rules_nightly_or_tag
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY == "true"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

# ===========================================================================
# Stage: lint
# ===========================================================================

# Verify every commit on this MR carries a Signed-off-by trailer (the
# Developer Certificate of Origin, see CONTRIBUTING.md). This is a
# *guard*, not a fixer — we never rewrite contributor commits in CI.
lint:dco:
  stage: lint
  needs: []
  rules:
    # Only run on MR pipelines — `git log $base..HEAD` makes no sense on
    # a single-commit push to main.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - |
      set -euo pipefail
      base="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-origin/$CI_DEFAULT_BRANCH}"
      missing=0
      while read -r sha; do
        if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
          echo "✗ commit $sha is missing a Signed-off-by trailer"
          missing=$((missing+1))
        fi
      done < <(git rev-list "$base..HEAD")
      if [ "$missing" -gt 0 ]; then
        echo
        echo "Add a sign-off with: git commit --amend -s   (or  git rebase -i ... and sign each)"
        exit 1
      fi
      echo "✓ all commits carry Signed-off-by"

# Linter pass for the YAML files we ship to operators (compose, sso
# example, github actions if any). Catches indentation goofs early.
lint:yaml:
  stage: lint
  # cytopia/yamllint's ENTRYPOINT is the yamllint binary itself, which
  # makes the GitLab runner's bash bootstrap script get passed as an
  # argument to yamllint instead of being executed. Override entrypoint
  # so the runner can run a normal shell inside the container.
  image:
    name: cytopia/yamllint:latest
    entrypoint: [""]
  needs: []
  <<: *rules_mr_or_default_branch
  before_script: []
  script:
    - yamllint -s -c .yamllint.yml .

# ===========================================================================
# Stage: build
# ===========================================================================

build:node:
  stage: build
  <<: *cache_node
  <<: *rules_mr_or_default_branch
  script:
    - npm ci --include=dev
    - npm run build --workspace packages/shared
    - npm run typecheck
    - npm run build
  artifacts:
    name: "node-dist-$CI_COMMIT_SHORT_SHA"
    paths:
      - apps/fleet-manager/dist/
      - apps/fleet-ui/dist/
      - apps/fleet-agent/dist/
      - packages/shared/dist/
      - packages/sdk/dist/
    expire_in: 1 week

build:provider:
  stage: build
  image: golang:1.22-bookworm
  <<: *cache_go_provider
  <<: *rules_mr_or_default_branch
  before_script:
    - go version
  script:
    - cd $PROVIDER_DIR
    - GOCACHE=$CI_PROJECT_DIR/.go-cache-provider go vet ./...
    - GOCACHE=$CI_PROJECT_DIR/.go-cache-provider go build -o terraform-provider-fleet .
  artifacts:
    name: "provider-$CI_COMMIT_SHORT_SHA"
    paths:
      - terraform/provider-fleet/terraform-provider-fleet
    expire_in: 1 week

build:fleetctl:
  stage: build
  image: golang:1.22-bookworm
  <<: *cache_go_fleetctl
  <<: *rules_mr_or_default_branch
  before_script:
    - go version
  script:
    - cd $FLEETCTL_DIR
    - GOCACHE=$CI_PROJECT_DIR/.go-cache-fleetctl go vet ./...
    - GOCACHE=$CI_PROJECT_DIR/.go-cache-fleetctl go build -o fleetctl .
  artifacts:
    name: "fleetctl-$CI_COMMIT_SHORT_SHA"
    paths:
      - cmd/fleetctl/fleetctl
    expire_in: 1 week

# ===========================================================================
# Stage: test
# ===========================================================================

# Boots the manager against an ephemeral postgres in a sibling service
# container, runs migrations + seed, hits /health. Cheap (~90s) and
# catches the vast majority of "shipped a broken migration" regressions.
test:manager:smoke-boot:
  stage: test
  needs: ["build:node"]
  <<: *cache_node
  <<: *rules_mr_or_default_branch
  services:
    - name: postgres:15-alpine
      alias: postgres
      variables:
        POSTGRES_USER: fleet
        POSTGRES_PASSWORD: fleet
        POSTGRES_DB: fleet
  variables:
    DATABASE_URL: "postgres://fleet:fleet@postgres:5432/fleet"
    FLEET_MANAGER_HOST: "0.0.0.0"
    FLEET_MANAGER_PORT: "9090"
    ADMIN_TOKEN: "ci-admin-token"
    REGISTRATION_TOKEN: "ci-registration-token"
    AGENT_BEARER_TOKEN: "ci-agent-token"
    SESSION_COOKIE_SECRET: "ci-cookie-secret-32bytes-or-more-padding"
    BOOTSTRAP_ADMIN_EMAIL: "ci@example.com"
    BOOTSTRAP_ADMIN_PASSWORD: "ci-bootstrap-pw"
    NODE_ENV: "production"
  script:
    - npm ci --include=dev
    - npm run build --workspace packages/shared
    - npm run build --workspace apps/fleet-manager
    - npm run migrate
    - npm run seed
    - node apps/fleet-manager/dist/index.js &
    - MANAGER_PID=$!
    - |
      # Wait up to 60s for /health to flip to 200.
      for i in $(seq 1 30); do
        if curl -sf -m 2 "http://127.0.0.1:9090/health" >/dev/null; then
          echo "✓ manager healthy"
          break
        fi
        sleep 2
      done
      if ! curl -sf -m 2 "http://127.0.0.1:9090/health" >/dev/null; then
        echo "✗ manager did not become healthy"
        kill $MANAGER_PID 2>/dev/null || true
        exit 1
      fi
    - |
      # Spot-check the public auth provider list endpoint — proves the
      # SSO loader didn't blow up at boot.
      curl -sf "http://127.0.0.1:9090/auth/providers" >/dev/null
    - kill $MANAGER_PID 2>/dev/null || true

test:provider:unit:
  stage: test
  image: golang:1.22-bookworm
  needs: ["build:provider"]
  <<: *cache_go_provider
  <<: *rules_mr_or_default_branch
  # Override the Node-flavored default.before_script — the Go image
  # has no node/npm so `node --version` fails.
  before_script:
    - go version
  script:
    - cd $PROVIDER_DIR
    - GOCACHE=$CI_PROJECT_DIR/.go-cache-provider go test ./... -count=1 -timeout 5m

test:fleetctl:unit:
  stage: test
  image: golang:1.22-bookworm
  needs: ["build:fleetctl"]
  <<: *cache_go_fleetctl
  <<: *rules_mr_or_default_branch
  before_script:
    - go version
  script:
    - cd $FLEETCTL_DIR
    - GOCACHE=$CI_PROJECT_DIR/.go-cache-fleetctl go test ./... -count=1 -timeout 5m

# ===========================================================================
# Stage: smoke
# ===========================================================================
#
# `scripts/e2e-terraform.sh` brings up the full compose stack (postgres
# + manager + a real Alloy + prom-sink), terraform applies, verifies
# pipelines arrive at the agent, the agent token works on remotecfg,
# the legacy bearer still works, and prom-sink receives samples.
#
# We only run this on:
#   * the default branch (post-merge);
#   * tags (release gating);
#   * the nightly schedule (catches drift in upstream alloy/postgres).
#
# Why it lives in its own stage: it needs Docker-in-Docker and is
# materially slower (~10–15 min) than the node/go test jobs.

smoke:e2e-terraform:
  stage: smoke
  image: docker:25
  services:
    - docker:25-dind
  needs: []
  <<: *rules_nightly_or_tag
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
    # Match the defaults in scripts/e2e-terraform.sh; CI already controls
    # the host so we don't override them here.
    ADMIN_TOKEN: "change-me-admin-token"
    AGENT_BEARER_TOKEN: "change-me-agent-bearer-token"
  before_script:
    - apk add --no-cache bash curl jq go terraform docker-cli docker-cli-compose npm nodejs
    - docker info
  script:
    # The e2e script auto-detects `docker compose`.
    - bash scripts/e2e-terraform.sh
  artifacts:
    when: on_failure
    paths:
      - /tmp/e2e-getconfig.json
      - /tmp/e2e-getconfig-legacy.json
    expire_in: 1 week

# ===========================================================================
# Stage: release  (tag-only)
# ===========================================================================
#
# Triggered by `git push origin vX.Y.Z`. Each job is independent — a
# failure to publish to npm does not block the docker push, and vice
# versa. Re-run a failed job in isolation from the GitLab UI.

# ---- 1. Multi-arch fleet-manager docker image ----------------------------

release:docker:fleet-manager:
  stage: release
  image: docker:25
  services:
    - docker:25-dind
  needs: []
  <<: *rules_tag_only
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
  before_script:
    - apk add --no-cache git
    - |
      if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
        echo "✗ DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not set."
        echo "  Configure them under Settings → CI/CD → Variables (masked + protected)."
        exit 1
      fi
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - docker buildx create --use --name fleet-builder
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - IMAGE="$DOCKERHUB_USERNAME/fleet-manager"
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --file apps/fleet-manager/Dockerfile \
        --label "org.opencontainers.image.source=https://github.com/danielfree19/alloy-fleet-manager" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.version=$VERSION" \
        --label "org.opencontainers.image.licenses=Apache-2.0" \
        --label "org.opencontainers.image.title=Alloy Fleet Manager" \
        --label "org.opencontainers.image.description=Self-hosted fleet management for Grafana Alloy" \
        --label "org.opencontainers.image.url=https://github.com/danielfree19/alloy-fleet-manager" \
        --label "org.opencontainers.image.documentation=https://github.com/danielfree19/alloy-fleet-manager/blob/main/README.md" \
        --provenance=false \
        --push \
        --tag "$IMAGE:$VERSION" \
        --tag "$IMAGE:latest" \
        .

# ---- 2. Terraform provider release (GoReleaser, GPG-signed) -------------
#
# GoReleaser does the heavy lifting:
#   * cross-compiles for the Terraform Registry's required matrix
#     (linux/darwin/windows × amd64/arm/arm64);
#   * produces SHA256SUMS;
#   * GPG-signs SHA256SUMS with the key whose ASCII-armored private bytes
#     live in the GPG_PRIVATE_KEY CI variable (passphrase in
#     GPG_PASSPHRASE);
#   * uploads the artifacts to a GitLab generic package, where the
#     Terraform Registry's "private registry protocol" or the public
#     `registry.terraform.io` (via a small redirector) can fetch them.
#
# Required CI variables for this job:
#   GPG_PRIVATE_KEY     — ASCII-armored, exported with `--export-secret-keys --armor`
#   GPG_PASSPHRASE      — passphrase for the key above
#   GORELEASER_KEY      — (optional) GoReleaser Pro key, blank if using OSS

release:provider:goreleaser:
  stage: release
  # The goreleaser image has ENTRYPOINT ["goreleaser"], which makes the
  # GitLab runner's shell bootstrap get passed as goreleaser arguments
  # (`goreleaser -c "<script>"` → unknown shorthand flag 'c'). Override.
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  needs: []
  <<: *rules_tag_only
  before_script:
    - apk add --no-cache git gnupg bash
  script:
    # Single bash block so GORELEASER_FLAGS persists into the
    # goreleaser invocation (CI script lines run in fresh shells, so
    # variables set in one line don't carry into the next).
    - |
      bash -c '
      set -euo pipefail
      cd "$PROVIDER_DIR"
      FLAGS="--clean"
      if [ -n "${GPG_PRIVATE_KEY:-}" ]; then
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        export GPG_FINGERPRINT="$(gpg --list-secret-keys --with-colons | awk -F: "/^fpr:/ {print \$10; exit}")"
        # Materialize the passphrase as a 0600 file so goreleaser can
        # pass it to gpg via --passphrase-file (loopback pinentry).
        # Argv-based --passphrase would briefly leak via /proc/<pid>/cmdline.
        export GPG_PASSPHRASE_FILE="$(mktemp)"
        chmod 600 "$GPG_PASSPHRASE_FILE"
        printf "%s" "${GPG_PASSPHRASE:-}" > "$GPG_PASSPHRASE_FILE"
        echo "✓ GPG signing enabled — fingerprint $GPG_FINGERPRINT"
      else
        echo "⚠ GPG_PRIVATE_KEY not set — skipping signature step."
        echo "  Required only for publishing through registry.terraform.io."
        FLAGS="$FLAGS --skip=sign"
      fi
      goreleaser release $FLAGS --config .goreleaser.yml
      '
  artifacts:
    name: "terraform-provider-fleet-$CI_COMMIT_TAG"
    paths:
      - terraform/provider-fleet/dist/
    expire_in: 90 days

# ---- 3. fleetctl release (GoReleaser, multi-OS archives) ----------------

release:fleetctl:goreleaser:
  stage: release
  # See note in release:provider:goreleaser — same ENTRYPOINT override
  # is needed for the goreleaser image.
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  needs: []
  <<: *rules_tag_only
  before_script:
    - apk add --no-cache git
    # goreleaser v2 won't traverse `..` in archives.files. Copy the
    # repo-root LICENSE and NOTICE into the fleetctl module so the
    # archive bundles them with local paths.
    - cp LICENSE NOTICE cmd/fleetctl/
  script:
    - cd $FLEETCTL_DIR
    - goreleaser release --clean --config .goreleaser.yml
  artifacts:
    name: "fleetctl-$CI_COMMIT_TAG"
    paths:
      - cmd/fleetctl/dist/
    expire_in: 90 days

# ---- 4. npm publish for @fleet-oss/sdk ----------------------------------

release:sdk:npm:
  stage: release
  needs: []
  <<: *rules_tag_only
  before_script:
    - npm --version
    - |
      if [ -z "${NPM_TOKEN:-}" ]; then
        echo "✗ NPM_TOKEN is not set"; exit 1
      fi
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  script:
    - npm ci --include=dev
    - npm run build --workspace packages/shared
    - npm run build --workspace packages/sdk
    # Tag must match the package.json version. Bumping one without the
    # other is a release-time bug; fail fast.
    - PKG_VERSION="$(node -p "require('./packages/sdk/package.json').version")"
    - TAG_VERSION="${CI_COMMIT_TAG#v}"
    - |
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "✗ packages/sdk/package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
        exit 1
      fi
    # Idempotent: a tag whose version is already on npmjs.com is a
    # no-op. Lets us re-trigger the pipeline after an unrelated job
    # fix without having to bump the SDK version.
    - |
      if npm view "@fleet-oss/sdk@$PKG_VERSION" version >/dev/null 2>&1; then
        echo "✓ @fleet-oss/sdk@$PKG_VERSION is already on npmjs.com — skipping publish."
        exit 0
      fi
    # `--provenance` stays off; npm only attests provenance from a few
    # supported providers and self-hosted GitLab isn't one.
    - npm publish --workspace packages/sdk --access public

# ---- 5. GitLab Release: Generic Packages + Release entry ----------------
#
# Uploads the GoReleaser dist/* (TF provider + fleetctl) to GitLab's
# built-in Generic Package registry, then creates a GitLab Release
# pinning each artifact as a downloadable asset link. This is the
# self-hosted equivalent of GitHub Releases — the project's `Releases`
# page becomes the single source of binaries for external users.
#
# Auth: uses the per-job CI_JOB_TOKEN, which has the right scopes by
# default. No extra CI variable required.
#
# Public access: works for anyone (no auth) only if the project's
# visibility is `public`. With `private`/`internal` external installs
# need a deploy token; document this in docs/release.md.

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  <<: *rules_tag_only
  needs:
    - job: release:provider:goreleaser
      artifacts: true
    - job: release:fleetctl:goreleaser
      artifacts: true
  before_script:
    - apk add --no-cache curl bash
  script:
    - |
      bash -c '
      set -euo pipefail
      VERSION="${CI_COMMIT_TAG#v}"
      ASSET_LINKS=()

      upload() {
        local pkg=$1 path=$2
        local file=$(basename "$path")
        local url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$pkg/$VERSION/$file"
        echo "→ $pkg/$VERSION/$file"
        curl -sS --fail-with-body --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$path" "$url" >/dev/null
        ASSET_LINKS+=("--assets-link={\"name\":\"$file\",\"url\":\"$url\",\"link_type\":\"package\"}")
      }

      # TF provider artifacts
      for f in terraform/provider-fleet/dist/*.zip \
               terraform/provider-fleet/dist/*SHA256SUMS* \
               terraform/provider-fleet/dist/*manifest.json; do
        [ -e "$f" ] && upload terraform-provider-fleet "$f"
      done

      # fleetctl binaries
      for f in cmd/fleetctl/dist/*.tar.gz \
               cmd/fleetctl/dist/*.zip \
               cmd/fleetctl/dist/*SHA256SUMS*; do
        [ -e "$f" ] && upload fleetctl "$f"
      done

      # Cross-references to the other distribution channels so the
      # release page is the one URL operators need. These are pure
      # links — release-cli does not check that they resolve.
      ASSET_LINKS+=("--assets-link={\"name\":\"Docker image — danielfree19/fleet-manager:$VERSION\",\"url\":\"https://hub.docker.com/r/danielfree19/fleet-manager/tags\",\"link_type\":\"image\"}")
      ASSET_LINKS+=("--assets-link={\"name\":\"npm — @fleet-oss/sdk@$VERSION\",\"url\":\"https://www.npmjs.com/package/@fleet-oss/sdk/v/$VERSION\",\"link_type\":\"package\"}")

      # Release notes from CHANGELOG.md when the matching version is present.
      DESC="Release $CI_COMMIT_TAG. See CHANGELOG.md for details."
      if [ -f CHANGELOG.md ] && grep -q "^## \[$VERSION\]" CHANGELOG.md; then
        DESC=$(awk "/^## \\[$VERSION\\]/{flag=1;next}/^## \\[/{flag=0}flag" CHANGELOG.md)
      fi

      release-cli create \
        --name "$CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "$DESC" \
        "${ASSET_LINKS[@]}"
      '

# ===========================================================================
# Stage: mirror  (always runs on default branch + tags)
# ===========================================================================
#
# Push the GitLab repository (refs + tags) to the GitHub mirror. The
# mirror is read-only on the GitHub side; issues and MRs stay on GitLab.
#
# Required CI variables:
#   GITHUB_MIRROR_URL    e.g.  github.com/danielfree19/alloy-fleet-manager.git
#   GITHUB_DEPLOY_KEY    base64-encoded private SSH key with **write**
#                        access to the GitHub mirror (a GitHub deploy key
#                        with "Allow write access" enabled). Generate
#                        with `ssh-keygen -t ed25519 -f mirror_key -C
#                        gitlab-ci-mirror`, then `base64 -w0 mirror_key`.
#
# Why a deploy key not a PAT:
#   - PATs leak more (a leaked PAT may unlock dozens of repos, a deploy
#     key is scoped to a single repo);
#   - SSO orgs frequently invalidate PATs without warning;
#   - GitLab's `protected: true` flag on the variable + a one-purpose
#     deploy key is a tighter security boundary.

mirror:github:
  stage: mirror
  image: alpine:3.20
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY_MIRROR == "true"'
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - |
      if [ -z "${GITHUB_DEPLOY_KEY:-}" ] || [ -z "${GITHUB_MIRROR_URL:-}" ]; then
        echo "Mirror not configured (GITHUB_DEPLOY_KEY / GITHUB_MIRROR_URL missing); skipping."
        exit 0
      fi
    - echo "$GITHUB_DEPLOY_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
  script:
    # GitLab CI's automatic clone is shallow, detached-HEAD, and only
    # has the triggering ref under refs/remotes/origin/. A `git push
    # --mirror` from that state pushes refs/remotes/origin/* and
    # refs/pipelines/* verbatim — leaving GitHub with no actual
    # `refs/heads/main` and a non-loading repo page (caught the hard
    # way on the first run). Fetch real branch + tag refs into local
    # heads first, then push only those refs.
    - git remote add github "git@${GITHUB_MIRROR_URL/https:\/\//}" || true
    - git remote set-url github "git@github.com:${GITHUB_MIRROR_URL#github.com/}"
    - git fetch --tags --prune origin '+refs/heads/*:refs/heads/*'
    # --prune deletes GitHub refs that no longer exist on GitLab, so
    # the mirror is a true mirror. Explicit refspecs keep us from
    # leaking GitLab-internal refs (refs/pipelines/*, refs/keep-around/*).
    - git push --prune github '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'

# ---- 7. Wiki sync (GitLab + GitHub) -------------------------------------
#
# Both jobs run scripts/build-wiki.sh to materialize a wiki tree from
# docs/* + selected root files, then force the result onto the wiki
# git repos backing each surface. Wiki edits made through the UI are
# overwritten on the next sync — the banner on every page says so.
#
# Auth:
#   GitLab — uses a project access token (GITLAB_WIKI_TOKEN) with
#            `write_repository` scope and Maintainer access level.
#            CI_JOB_TOKEN cannot push to .wiki.git on this server
#            (`403 You are not allowed to write to this project's wiki`),
#            so a dedicated token is required. Rotate via
#            `glab token rotate fleet-oss-wiki-sync` and pipe the new
#            value into `glab variable update GITLAB_WIKI_TOKEN`.
#   GitHub — reuses the existing GITHUB_DEPLOY_KEY (the mirror key).
#            GitHub deploy keys with write access on a repo can also
#            push to that repo's .wiki.git.
#
# Bootstrap (one-time, manual):
#   GitLab — wiki is auto-initialized on first edit; if the clone 404s,
#            visit `$CI_PROJECT_URL/-/wikis/home` and create any page.
#   GitHub — Settings → Features → tick "Wikis", then Wiki tab →
#            "Create the first page". Without this the .wiki.git repo
#            does not exist yet and the job will fail-soft skip.

wiki:sync:gitlab:
  stage: mirror
  image: alpine:3.20
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache bash git
  script:
    - bash scripts/build-wiki.sh
    - |
      bash -c '
      set -euo pipefail
      if [ -z "${GITLAB_WIKI_TOKEN:-}" ]; then
        echo "GITLAB_WIKI_TOKEN not set; skipping GitLab wiki sync."
        echo "Create one with: glab token create --access-level maintainer --scope write_repository --duration 360d fleet-oss-wiki-sync"
        echo "Then upload via:  glab variable set GITLAB_WIKI_TOKEN --protected --masked --raw"
        exit 0
      fi
      WIKI_URL="https://oauth2:${GITLAB_WIKI_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.wiki.git"
      tmp=$(mktemp -d)
      if ! git clone --depth=1 "$WIKI_URL" "$tmp" 2>/tmp/clone.err; then
        echo "✗ Cannot clone GitLab wiki:"
        sed "s/${GITLAB_WIKI_TOKEN}/***/g" /tmp/clone.err
        echo "Bootstrap: visit $CI_PROJECT_URL/-/wikis/home and create any page."
        echo "(Skipping — not failing the pipeline.)"
        exit 0
      fi
      find "$tmp" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
      cp -a wiki-build/. "$tmp/"
      cd "$tmp"
      git config user.email "ci@fleet-oss"
      git config user.name "Fleet OSS CI"
      git add -A
      if git diff --cached --quiet; then
        echo "✓ wiki already up to date."
        exit 0
      fi
      git commit -m "wiki: sync from $CI_COMMIT_SHORT_SHA"
      git push origin HEAD
      echo "✓ pushed to GitLab wiki."
      '

wiki:sync:github:
  stage: mirror
  image: alpine:3.20
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache bash git openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - |
      if [ -z "${GITHUB_DEPLOY_KEY:-}" ] || [ -z "${GITHUB_MIRROR_URL:-}" ]; then
        echo "GitHub mirror not configured (GITHUB_DEPLOY_KEY / GITHUB_MIRROR_URL missing); skipping wiki sync."
        exit 0
      fi
    - echo "$GITHUB_DEPLOY_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - bash scripts/build-wiki.sh
    - |
      bash -c '
      set -euo pipefail
      # GITHUB_MIRROR_URL is documented as github.com/<owner>/<repo>.git;
      # tolerate a stray https:// prefix and a missing .git suffix too.
      mirror_path="${GITHUB_MIRROR_URL#https://}"
      mirror_path="${mirror_path#github.com/}"
      mirror_path="${mirror_path%.git}"
      WIKI_URL="git@github.com:${mirror_path}.wiki.git"
      tmp=$(mktemp -d)
      if ! git clone --depth=1 "$WIKI_URL" "$tmp" 2>/tmp/clone.err; then
        echo "✗ Cannot clone GitHub wiki: $WIKI_URL"
        cat /tmp/clone.err
        echo "Bootstrap: enable Wikis under repo Settings → Features,"
        echo "then visit the Wiki tab and create the first page."
        echo "(Skipping — not failing the pipeline.)"
        exit 0
      fi
      find "$tmp" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
      cp -a wiki-build/. "$tmp/"
      cd "$tmp"
      git config user.email "ci@fleet-oss"
      git config user.name "Fleet OSS CI"
      git add -A
      if git diff --cached --quiet; then
        echo "✓ wiki already up to date."
        exit 0
      fi
      git commit -m "wiki: sync from $CI_COMMIT_SHORT_SHA"
      git push origin HEAD
      echo "✓ pushed to GitHub wiki."
      '
